<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/output.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  </head>
  <body class="text-white overflow-x-hidden">
    <main class="px-[60px] max-sm:px-0">
      <header class="bg-[url('/images/image.png')] rounded-b-xl opacity-85 bg-no-repeat bg-cover px-15 max-sm:px-4 flex py-4 max-sm:py-2 justify-between items-center max-w-screen gap-1">
        <div>
          <img src="/images/logo.svg" alt="logo" class="object-contain w-35 max-sm:w-23">
        </div>
        <div class="text-white flex items-center justify-center gap-10 text-lg max-sm:text-[12px] max-sm:gap-4">
          <a href="index.html" class="link hover-link">Home</a>
          <a href="store.html" class="link hover-link">Store</a>
          <a href="#" class="link hover-link">Feature</a>
          <a href="#" class="link hover-link">Contact</a>
        </div>
        <div class="cursor-pointer relative transform hover:scale-120 transition duration-300">
          <img src="/images/cart.svg" alt="cart" class="object-contain h-10 max-sm:h-7">
        </div>
      </header>

      <section class="flex justify-between max-sm:px-4 min-h-screen relative mb-4">
        <div class="bg-image"></div>
        <div data-aos="fade-right" class="flex flex-col justify-center h-screen">
          <h1 class="text-white text-6xl max-sm:text-3xl font-bold leading-20 max-sm:leading-6 tracking-tighter">
          Groceries<br>delivery in <span class="font-light">15 mins</span>
          </h1>
          <p class="text-gray-300 my-2 max-sm:my-1 max-sm:text-md tracking-tighter">Grocify offer a wide range of products including fresh products, meats, <br>baked goods and non-perishable items.</p>
          <!--Buttons-->
          <div class="my-7 flex items-center gap-4">
            <div class="flex flex-col gap-2">
              <a id="signupBtn" class="px-6 py-2.5 bg-yellow-300 hover:bg-yellow-400 transition rounded-3xl text-md font-semibold cursor-pointer max-sm:px-2 hover:scale-105 active:scale-95 flex justify-center items-center gap-1">
                Sign Up/Login <img id="arrow-icon" src="/images/down-arrow.png" alt="down-arrow" class="h-6 inline">
              </a>
              <a href="login.html" id="loginText" class="px-6 py-2.5 bg-yellow-300 hover:bg-yellow-400 transition rounded-3xl text-md font-semibold cursor-pointer max-sm:px-2 hover:scale-105 active:scale-95 hidden">Login</a>
            </div>
          
            
          <a class="text-white mx-4 max-sm:mx-0 font-semibold text-md bg-black/70 hover:bg-black transition px-6 py-2.5 rounded-3xl cursor-pointer hover:scale-105 active:scale-95" href="store.html">
            Visit Store 
            <img src="/images/shopping-cart.png" alt="shopping-cart" class="h-5 inline">
          </a>
          </div>
        </div>
        <!--Image-->
        <div data-aos="fade-left" class="max-sm:hidden">
          <div>
            <div>
            <img src="/images/grocery-image.png" alt="" class="max-h-screen object-cover">
          </div>
          </div>
        </div>
      </section>
    </main>
    

    <footer class="bg-slate-500/20 px-10 py-10 ">
      <div class="text-2xl font-bold">
        <p>&copy; Grocify. All Right Reserved.</p>
      </div>
    </footer>


    <!--AOS JS-->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
      // Global settings:
      duration: 800, //values from 0 to 3000, with step 50ms
      once: false, // whether animation should happen only once while scrolling down
      mirror: true, // whether elements should animate out while scrolling past them
      });
    </script>
    <script src="index.js"></script>
  </body>
</html>

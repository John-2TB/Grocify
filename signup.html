<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/output.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  </head>
  <body class="bg-[url('/images/image.png')] bg-no-repeat bg-cover text-white flex flex-col overflow-x-hidden">
    <main class="px-15 max-sm:px-0">
      <header class="bg-[url('/images/image.png')] opacity-85 bg-no-repeat bg-cover flex py-4 justify-between items-center w-full sticky px-4 rounded-b-xl z-10 top-0">
        <div>
          <img src="/images/logo.svg" alt="logo" class="object-contain w-35 max-sm:w-23">
        </div>
        <div class="text-white flex items-center justify-center gap-10 text-lg max-sm:text-[12px] max-sm:gap-4">
          <a href="index.html" class="link hover-link">Home</a>
          <a href="store.html" class="link hover-link">Store</a>
          <a href="#" class="link hover-link">Feature</a>
          <a href="#" class="link hover-link">Contact</a>
        </div>
        <div class="cursor-pointer relative transform hover:scale-120 transition duration-300 ">
          <img src="/images/cart.svg" alt="cart" class="object-contain h-10 max-sm:h-7">
      </header>

      <section class="flex grow items-center justify-center min-h-screen">
        <div class="flex flex-col">
          <h1 class="text-4xl font-bold tracking-tighter text-center">Create an account</h1>
          <form class="flex flex-col items-center justify-center gap-2">
            <!--Name-->
            <div class="flex flex-col my-2">
              <label for="name" class="font-medium text-xl">Full name</label>
              <input required id="name" type="text" name="name" placeholder="Full name" class="bg-white hover:bg-white/95 transition placeholder:text-slate-400 rounded-md py-2 px-4 w-[min(50vw,300px)] text-black">
            </div>
            <!--Email-->
            <div class="flex flex-col my-2">
              <label for="email" class="font-medium text-xl ">Email</label>
              <input required id="email" type="email" name="email" placeholder="Enter your email" class="bg-white hover:bg-white/95 transition placeholder:text-slate-400 rounded-md py-2 px-4 w-[min(50vw,300px)] text-black">
            </div>

            <!--Password-->
            <div class="flex flex-col my-2">
              <label for="password" class="font-medium text-xl">Password</label>
              <input required type="password" name="password" id="password" placeholder="Enter your password" class="bg-white hover:bg-white/95 transition text-black placeholder:text-slate-400 rounded-md py-2 px-4 w-[min(50vw,300px)]">
            </div>

            <!--Confirm Password-->
            <div class="flex flex-col my-2">
              <label for="confirmPassword" class="font-medium text-xl">Confirm Password</label>
              <input required type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm your password" class="bg-white hover:bg-white/95 transition text-black placeholder:text-slate-400 rounded-md py-2 px-4 w-[min(50vw,300px)]">
              <p id="passwordReport"></p>
            </div>

            <!--Sign Up-->
            <div class="flex justify-center items-center mt-6 mb-2">
              <button type="submit" class="text-xl bg-yellow-300 px-2 py-1 rounded-sm hover:scale-105 active:scale-95 transition hover:bg-yellow-400 cursor-pointer" id="signupBtn">Sign Up</button>
            </div>

            <p class="whitespace-nowrap">Already have an account? Click here to <a href="login.html" class="underline text-yellow-300">Login</a></p>
          </form>
        </div>

      </section>

    </main>
    

    <footer class="bg-slate-500/20 px-10 py-10 mt-8">
      <div class="text-2xl font-bold">
        <p>&copy; Grocify. All Right Reserved.</p>
      </div>
    </footer>

    <!--AOS JS-->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
      // Global settings:
      duration: 800, //values from 0 to 3000, with step 50ms
      once: false, // whether animation should happen only once while scrolling down
      mirror: true, // whether elements should animate out while scrolling past them
      });
    </script>
    <script src="signup.js"></script>
  </body>
</html>

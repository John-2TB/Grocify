<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/output.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  </head>
  <body class="bg-[url('/images/image.png')] bg-no-repeat bg-cover text-white flex flex-col">
    <main class="px-[60px]">
      <!--Header-->
      <header class="bg-[url('/images/image.png')] inset-0 opacity-85 bg-no-repeat bg-cover flex py-4 justify-between items-center max-w-screen sticky px-4 rounded-b-xl z-10 top-0 right-0 left-0">
        <div>
          <img src="/images/logo.svg" alt="logo" class="object-contain w-35 opacity-100 inset-0">
        </div>
        <div class="text-white flex items-center justify-center gap-10 text-lg opacity-100 inset-0">
          <a href="index.html" class="link hover-link">Home</a>
          <a href="store.html" class="link hover-link">Store</a>
          <a href="#" class="link hover-link">Feature</a>
          <a href="#" class="link hover-link">Contact</a>
        </div>
        <div class="cursor-pointer relative transform hover:scale-120 transition duration-300 opacity-100 inset-0">
          <img src="/images/cart.svg" alt="cart" class="object-contain h-10">
        </div>
      </header>

      <!--Section-->
      <section class="flex min-h-screen gap-x-4 py-4">
        <!--Login Form-->
        <div class="flex flex-col items-center justify-center flex-1">
          <h1 class="text-3xl font-bold tracking-tighter my-8">Sign in</h1>
          <form>
            <!--Email-->
            <div class="flex flex-col my-2">
              <label for="email" class="font-medium text-xl ">Email</label>
              <input required id="email" type="email" name="email" placeholder="Enter your email" class="bg-white hover:bg-white/95 transition  placeholder:text-slate-400 rounded-md py-2 px-4 w-[min(50vw,300px)] text-black">
            </div>

            <!--Password-->
            <div class="flex flex-col my-2">
              <label for="password" class="font-medium text-xl">Password</label>
              <input required type="password" name="password" id="password" placeholder="Enter your password" class="bg-white hover:bg-white/95 transition text-black placeholder:text-slate-400 rounded-md py-2 px-4 w-[min(50vw,300px)]">
              <p id="loginReport"></p>
            </div>

            <!--Login-->
            <div class="flex justify-center items-center mt-6 mb-2">
              <button type="submit" class="text-xl bg-yellow-300 px-2 py-1 rounded-sm cursor-pointer hover:scale-105 active:scale-95 hover:bg-yellow-400 transition" id="login">Login</button>
            </div>

            <p class="whitespace-nowrap">You don't have an account? Click here to <a href="signup.html" class="underline text-yellow-300">Sign Up</a></p>
          </form>
        </div>

        <!--3D Spline-->
        <div class="min-h-screen object-cover w-full bg-slate-400/25 flex-1">
          <spline-viewer url="https://prod.spline.design/hwetFXP6B6Ydc1t1/scene.splinecode"></spline-viewer>
        </div>
      </section>
      </main>
    

    <footer class="bg-slate-500/20 px-10 py-10 mt-8">
      <div class="text-2xl font-bold">
        <p>&copy; Grocify. All Right Reserved.</p>
      </div>
    </footer>

    

    <!--AOS JS-->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
      // Global settings:
      duration: 500, //values from 0 to 3000, with step 50ms
      once: false, // whether animation should happen only once while scrolling down
      mirror: true, // whether elements should animate out while scrolling past them
      });
    </script>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.61/build/spline-viewer.js"></script>
    <script src="login.js"></script>
  </body>
</html>
